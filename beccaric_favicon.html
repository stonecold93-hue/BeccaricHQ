<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BeccaricHQ Favicon</title>
<style>
body { background: #060404; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 32px; font-family: monospace; color: #888; }
.previews { display: flex; align-items: flex-end; gap: 32px; }
.preview-box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
canvas { image-rendering: pixelated; border-radius: 4px; }
.size-label { font-size: 10px; letter-spacing: .2em; color: #555; }
.dl-btn {
  margin-top: 8px; padding: 10px 28px;
  background: linear-gradient(135deg, #C47D0E, #F4A623);
  border: none; border-radius: 4px; cursor: pointer;
  font-family: monospace; font-size: 11px; letter-spacing: .2em;
  color: #030200; font-weight: bold; text-transform: uppercase;
}
.dl-btn:hover { opacity: .85; }
h2 { font-size: 11px; letter-spacing: .4em; text-transform: uppercase; color: #555; margin: 0; }
</style>
</head>
<body>

<h2>BeccaricHQ — Favicon</h2>

<div class="previews">
  <div class="preview-box">
    <canvas id="c16" width="16" height="16" style="width:64px;height:64px"></canvas>
    <span class="size-label">16 × 16</span>
  </div>
  <div class="preview-box">
    <canvas id="c32" width="32" height="32" style="width:96px;height:96px"></canvas>
    <span class="size-label">32 × 32</span>
  </div>
  <div class="preview-box">
    <canvas id="c64" width="64" height="64" style="width:128px;height:128px"></canvas>
    <span class="size-label">64 × 64</span>
  </div>
  <div class="preview-box">
    <canvas id="c128" width="128" height="128"></canvas>
    <span class="size-label">128 × 128</span>
  </div>
</div>

<button class="dl-btn" onclick="download()">⬇ Télécharger favicon.png (128px)</button>

<script>
function drawChest(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext("2d");
  const sc = s / 128;

  ctx.clearRect(0, 0, s, s);

  // background — dark gold
  ctx.fillStyle = "#0E0900";
  roundRect(ctx, 0, 0, s, s, s * 0.12);
  ctx.fill();

  const x = sc, y = sc;

  // ── shadow
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ellipse(ctx, 64*sc, 114*sc, 40*sc, 5*sc);
  ctx.fill();

  // ── BODY
  grad(ctx, "bodyG", 0, 60*sc, 0, 108*sc, ["#C47D0E","#6A3E00"]);
  roundRect(ctx, 14*sc, 60*sc, 100*sc, 44*sc, 3*sc);
  ctx.fillStyle = ctx.createLinearGradient(0,60*sc,0,104*sc);
  ctx.fillStyle = makeGrad(ctx, 0,60*sc,0,104*sc, "#C47D0E","#6A3E00");
  ctx.fill();

  // body planks
  ctx.strokeStyle = "rgba(80,40,0,0.5)"; ctx.lineWidth = sc;
  line(ctx, 14*sc, 76*sc, 114*sc, 76*sc);
  line(ctx, 14*sc, 90*sc, 114*sc, 90*sc);

  // body band top
  band(ctx, 14*sc, 60*sc, 100*sc, 7*sc, sc);
  // body band bottom
  band(ctx, 14*sc, 97*sc, 100*sc, 7*sc, sc);

  // ── LID
  ctx.fillStyle = makeGrad(ctx, 0,22*sc,0,60*sc, "#FFE99A","#D4921A","#8A5600");
  roundRect(ctx, 12*sc, 22*sc, 104*sc, 40*sc, 3*sc);
  ctx.fill();

  // lid planks
  ctx.strokeStyle = "rgba(100,50,0,0.4)"; ctx.lineWidth = sc;
  line(ctx, 12*sc, 34*sc, 116*sc, 34*sc);
  line(ctx, 12*sc, 46*sc, 116*sc, 46*sc);

  // lid band top
  band(ctx, 12*sc, 22*sc, 104*sc, 6*sc, sc);
  // lid band bottom (join)
  band(ctx, 12*sc, 56*sc, 104*sc, 7*sc, sc);

  // lid highlight
  ctx.fillStyle = "rgba(255,245,180,0.18)";
  roundRect(ctx, 12*sc, 22*sc, 104*sc, 4*sc, 2*sc);
  ctx.fill();

  // ── RIVETS
  rivet(ctx, 18*sc, 65*sc, 5*sc);
  rivet(ctx, 110*sc, 65*sc, 5*sc);
  rivet(ctx, 18*sc, 100*sc, 5*sc);
  rivet(ctx, 110*sc, 100*sc, 5*sc);
  rivet(ctx, 18*sc, 27*sc, 5*sc);
  rivet(ctx, 110*sc, 27*sc, 5*sc);

  // ── HINGE
  ctx.fillStyle = makeGrad(ctx, 0,20*sc,0,26*sc, "#FFE99A","#8A5600");
  roundRect(ctx, 48*sc, 19*sc, 32*sc, 5*sc, 2*sc);
  ctx.fill();

  // ── LOCK PLATE
  ctx.fillStyle = makeGrad(ctx, 0,54*sc,0,72*sc, "#D4921A","#8A5600");
  roundRect(ctx, 53*sc, 54*sc, 22*sc, 16*sc, 2*sc);
  ctx.fill();

  // shackle
  ctx.strokeStyle = makeGrad(ctx, 0,46*sc,0,58*sc, "#FFE99A","#C47D0E");
  ctx.lineWidth = 3*sc; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.arc(64*sc, 56*sc, 7*sc, Math.PI, 0);
  ctx.stroke();

  // lock body
  ctx.fillStyle = makeGrad(ctx, 56*sc,56*sc,72*sc,70*sc, "#FFE99A","#C47D0E");
  roundRect(ctx, 57*sc, 56*sc, 14*sc, 11*sc, 2*sc);
  ctx.fill();

  // keyhole
  ctx.fillStyle = "#3A1A00";
  ctx.beginPath(); ctx.arc(64*sc, 60*sc, 2*sc, 0, Math.PI*2); ctx.fill();
  roundRect(ctx, 63*sc, 61*sc, 2*sc, 4*sc, 1*sc);
  ctx.fill();

  // ── ENGRAVED TEXT (only on bigger sizes)
  if (s >= 64) {
    ctx.fillStyle = "rgba(15,5,0,0.8)";
    ctx.font = `bold ${7*sc}px "Cormorant Garamond", serif`;
    ctx.textAlign = "center";
    ctx.letterSpacing = `${2*sc}px`;
    ctx.fillText("BECCARIC", 64*sc, 85*sc);
    ctx.font = `${5*sc}px "Cormorant Garamond", serif`;
    ctx.fillText("HQ", 64*sc, 93*sc);
  }
}

function makeGrad(ctx, x0,y0,x1,y1,...colors) {
  const g = ctx.createLinearGradient(x0,y0,x1,y1);
  colors.forEach((c,i) => g.addColorStop(i/(colors.length-1), c));
  return g;
}
function roundRect(ctx, x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function ellipse(ctx,cx,cy,rx,ry) {
  ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
}
function line(ctx,x0,y0,x1,y1) {
  ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
}
function band(ctx,x,y,w,h,sc) {
  const g = ctx.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,"#F4C040"); g.addColorStop(0.5,"#C47D0E"); g.addColorStop(1,"#8A5600");
  ctx.fillStyle = g;
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle="rgba(255,230,80,0.35)"; ctx.lineWidth=0.6*sc;
  line(ctx,x,y+1,x+w,y+1);
}
function rivet(ctx,cx,cy,r) {
  const g = ctx.createRadialGradient(cx-r*.3,cy-r*.3,0,cx,cy,r);
  g.addColorStop(0,"#FFE99A"); g.addColorStop(1,"#C47D0E");
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.6)";
  ctx.beginPath(); ctx.arc(cx-r*.25,cy-r*.25,r*.35,0,Math.PI*2); ctx.fill();
}

["c16","c32","c64","c128"].forEach(id => {
  drawChest(document.getElementById(id));
});

function download() {
  const c = document.getElementById("c128");
  const a = document.createElement("a");
  a.download = "beccarichq-favicon.png";
  a.href = c.toDataURL("image/png");
  a.click();
}
</script>
</body>
</html>
