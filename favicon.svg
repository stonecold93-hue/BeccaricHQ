<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C47D0E"/><stop offset="100%" stop-color="#6A3E00"/></linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFE99A"/><stop offset="60%" stop-color="#D4921A"/><stop offset="100%" stop-color="#8A5600"/></linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F4C040"/><stop offset="100%" stop-color="#8A5600"/></linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFE99A"/><stop offset="100%" stop-color="#C47D0E"/></linearGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="32" cy="61" rx="20" ry="3" fill="#000" opacity=".3"/>
  <!-- body -->
  <rect x="6" y="34" width="52" height="24" rx="3" fill="url(#body)"/>
  <line x1="6" y1="42" x2="58" y2="42" stroke="#7A4800" stroke-width=".8" opacity=".5"/>
  <line x1="6" y1="50" x2="58" y2="50" stroke="#7A4800" stroke-width=".8" opacity=".5"/>
  <!-- body bands -->
  <rect x="6" y="34" width="52" height="5" fill="url(#band)"/>
  <rect x="6" y="53" width="52" height="5" fill="url(#band)"/>
  <!-- lid -->
  <rect x="4" y="12" width="56" height="24" rx="3" fill="url(#lid)"/>
  <line x1="4" y1="20" x2="60" y2="20" stroke="#8A5600" stroke-width=".8" opacity=".4"/>
  <line x1="4" y1="28" x2="60" y2="28" stroke="#8A5600" stroke-width=".8" opacity=".4"/>
  <rect x="4" y="12" width="56" height="4" fill="rgba(255,245,180,0.25)"/>
  <!-- lid band -->
  <rect x="4" y="32" width="56" height="5" fill="url(#band)"/>
  <rect x="4" y="12" width="56" height="4" fill="url(#band)"/>
  <!-- rivets -->
  <circle cx="10" cy="37" r="3" fill="url(#metal)"/><circle cx="54" cy="37" r="3" fill="url(#metal)"/>
  <circle cx="10" cy="55" r="3" fill="url(#metal)"/><circle cx="54" cy="55" r="3" fill="url(#metal)"/>
  <circle cx="10" cy="15" r="3" fill="url(#metal)"/><circle cx="54" cy="15" r="3" fill="url(#metal)"/>
  <!-- hinge -->
  <rect x="22" y="10" width="20" height="4" rx="2" fill="url(#metal)"/>
  <!-- lock plate -->
  <rect x="24" y="31" width="16" height="10" rx="2" fill="url(#band)"/>
  <!-- shackle -->
  <path d="M28 34 Q28 28 32 28 Q36 28 36 34" stroke="url(#metal)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- lock body -->
  <rect x="26" y="33" width="12" height="7" rx="1.5" fill="url(#metal)"/>
  <!-- keyhole -->
  <circle cx="32" cy="36" r="1.8" fill="#3A1A00"/>
  <rect x="31.2" y="37" width="1.6" height="2.5" rx=".6" fill="#3A1A00"/>
</svg>
